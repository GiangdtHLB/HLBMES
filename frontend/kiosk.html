<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MES Kiosk — Xưởng bia</title>
  <style>
    :root { --pri:#1769aa; --ok:#1f9d55; --warn:#e67e22; --err:#c0392b; --line:#d7dee6; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; background:#eef2f6; color:#1a2533; font-size:18px; }
    header { background:var(--pri); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:20px; margin:0; flex:1; }
    header .who { font-size:14px; opacity:.95; text-align:right; }
    button { font-size:18px; font-family:inherit; cursor:pointer; border:none; border-radius:12px; }
    .btn { background:var(--pri); color:#fff; padding:16px 22px; font-weight:700; }
    .btn.big { padding:26px; font-size:22px; width:100%; }
    .btn.sec { background:#fff; color:var(--pri); border:2px solid var(--pri); }
    .btn.ok { background:var(--ok); } .btn.warn { background:var(--warn); } .btn.err { background:var(--err); }
    main { padding:18px; max-width:760px; margin:0 auto; }
    .tiles { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .tile { background:#fff; border:1px solid var(--line); border-radius:16px; padding:34px 18px; text-align:center;
      font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,.05); }
    .tile .ic { font-size:46px; display:block; margin-bottom:8px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-top:16px; }
    .scanbox { width:100%; font-size:26px; padding:18px; border:3px solid var(--pri); border-radius:14px; text-align:center; letter-spacing:1px; }
    .kv { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef2f6; }
    .kv b { color:#54606e; font-weight:600; }
    .qtybtns { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:10px; }
    .badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:14px; font-weight:700; }
    .b-ok { background:#e3f6ea; color:var(--ok); } .b-warn { background:#fdf0e1; color:var(--warn); }
    .b-err { background:#fbe6e3; color:var(--err); } .b-info { background:#e6f0f8; color:var(--pri); }
    .login { max-width:420px; margin:8vh auto; }
    .login input { width:100%; font-size:22px; padding:16px; border:2px solid var(--line); border-radius:12px; margin-top:10px; }
    .msg { margin-top:12px; font-weight:700; min-height:24px; }
    .back { background:rgba(255,255,255,.2); color:#fff; padding:8px 14px; font-size:15px; }
    @media print { header,.noprint { display:none !important; } body { background:#fff; } }
  </style>
</head>
<body>
  <header>
    <button class="back noprint" id="back" style="display:none">← Trang chính</button>
    <h1>🍺 MES Kiosk — Xưởng</h1>
    <div class="who" id="who"></div>
    <button class="back noprint" id="logout" style="display:none">Đăng xuất</button>
  </header>
  <main id="app"></main>
  <script src="/barcode.js"></script>
  <script src="/kiosk.js"></script>
</body>
</html>
